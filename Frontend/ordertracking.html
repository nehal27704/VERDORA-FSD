<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Live Order Tracking — Verdora</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --gd:#0d3314;--gdk:#1b5e20;--gm:#2e7d32;--g:#43a047;--gl:#81c784;--gp:#e8f5e9;
  --gold:#f9a825;--ora:#e65100;--slate:#1c313a;--cream:#fdfaf4;--w:#fff;
  --td:#1a2e1a;--tm:#4a6741;--tl:#7a9a77;
  --fd:'Playfair Display',Georgia,serif;--fb:'DM Sans',sans-serif;
  --s1:0 2px 12px rgba(0,0,0,.07);--s2:0 8px 32px rgba(0,0,0,.11);
  --r:20px;--tr:.3s cubic-bezier(.4,0,.2,1);
}
body{font-family:var(--fb);background:var(--cream);color:var(--td);line-height:1.6;-webkit-font-smoothing:antialiased}

/* Nav */
nav{position:fixed;top:0;left:0;right:0;z-index:300;height:68px;padding:0 4%;display:flex;align-items:center;justify-content:space-between;background:rgba(253,250,244,.94);backdrop-filter:blur(18px);border-bottom:1px solid rgba(102,187,106,.18);box-shadow:0 2px 20px rgba(0,0,0,.07)}
.logo{font-family:var(--fd);font-size:1.45rem;font-weight:900;color:var(--gdk);text-decoration:none}
.logo span{color:var(--g)}

.page-wrapper{max-width:1200px;margin:100px auto 40px;padding:0 4%;display:grid;grid-template-columns:1.2fr 1fr;gap:30px;align-items: start;}

/* Progress Section */
.card{background:var(--w);border-radius:var(--r);box-shadow:var(--s1);padding:30px;margin-bottom:25px;border:1px solid rgba(102,187,106,.1)}
.card-title{font-family:var(--fd);font-size:1.6rem;color:var(--gd);margin-bottom:20px}

/* Map & Partner */
.mp-wrap{height:280px;background:#e5e3df;border-radius:15px;position:relative;overflow:hidden;margin-bottom:25px;background-image:radial-gradient(#ccc 1px,transparent 1px);background-size:20px 20px}
.mp-label{position:absolute;top:15px;left:15px;background:var(--w);padding:8px 16px;border-radius:50px;font-weight:700;font-size:.8rem;box-shadow:var(--s1);z-index:5}
.mp-bar-bg{position:absolute;bottom:0;left:0;width:100%;height:6px;background:var(--gp)}
.mp-bar-fill{position:absolute;bottom:0;left:0;height:6px;background:var(--gm);width:55%;transition:width 1s linear}

/* Timeline */
.t-line{position:relative;margin-top:20px}
.t-item{display:flex;gap:20px;margin-bottom:25px;position:relative}
.t-item::before{content:'';position:absolute;left:14px;top:30px;width:2px;height:100%;background:var(--gp);z-index:1}
.t-item:last-child::before{display:none}
.t-dot{width:30px;height:30px;border-radius:50%;background:var(--gp);display:flex;align-items:center;justify-content:center;z-index:2;font-size:.8rem;color:var(--tm)}
.t-item.active .t-dot{background:var(--gm);color:var(--w);box-shadow:0 0 0 5px var(--gp)}
.t-item.done .t-dot{background:var(--gl);color:var(--w)}

/* RIGHT COLUMN - STICKY */
.sidebar{display:flex;flex-direction:column;gap:25px;position:sticky;top:90px}

/* Order Items List */
.order-list{max-height: 400px; overflow-y: auto;}
.o-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--gp)}
.o-item img{width:48px;height:48px;border-radius:8px;object-fit:cover;border:1px solid var(--gp)}
.o-info h4{font-size:.9rem;color:var(--gd);font-weight:700}
.o-info p{font-size:.75rem;color:var(--tl)}

/* Floating Style Sticky Cards */
.sticky-card{background:var(--w);border-radius:var(--r);padding:20px;box-shadow:var(--s2);border:1px solid var(--gp)}
.stars{display:flex;gap:5px;font-size:1.2rem;color:var(--gold);margin-top:10px;cursor:pointer}
.help-link{display:flex;align-items:center;gap:10px;font-weight:700;color:var(--gdk);text-decoration:none}
.help-icon{background:var(--gp);width:35px;height:35px;border-radius:50%;display:flex;align-items:center;justify-content:center}

@media(max-width:850px){.page-wrapper{grid-template-columns:1fr}.sidebar{position:static}}
</style>
</head>
<body>

<nav>
  <a href="landingpage.html" class="logo">Ver<span>dora</span></a>
  <button onclick="location.href='productss.html'" style="background:var(--gd);color:var(--w);border:none;padding:8px 20px;border-radius:50px;font-weight:700;cursor:pointer">Shop More</button>
</nav>

<div class="page-wrapper">
  
  <div class="content-main">
    <div class="card">
      <h2 class="card-title">Track Your Harvest</h2>
      
      <div class="mp-wrap">
        <div class="mp-label" id="live-dist">🛵 1.2 km away</div>
        <div style="position:absolute; bottom:30%; left:35%; font-size:2rem">🛵</div>
        <div style="position:absolute; top:20%; right:20%; font-size:2rem">🏠</div>
        <div class="mp-bar-bg"><div class="mp-bar-fill" id="live-progress"></div></div>
      </div>

      <div class="t-line">
        <div class="t-item done"><div class="t-dot">✓</div><div><h4>Order Confirmed</h4><p>11:20 AM</p></div></div>
        <div class="t-item done"><div class="t-dot">✓</div><div><h4>Harvested & Packed</h4><p>11:45 AM</p></div></div>
        <div class="t-item active"><div class="t-dot">🚚</div><div><h4>Out for Delivery</h4><p>Ravi Kumar is nearby</p></div></div>
        <div class="t-item"><div class="t-dot">○</div><div><h4>Arrived</h4><p>Estimated 12:45 PM</p></div></div>
      </div>
    </div>
  </div>

  <div class="sidebar">
    <div class="card" style="margin-bottom:0">
      <h3 style="font-family:var(--fd); margin-bottom:15px">In your shipment</h3>
      <div class="order-list" id="tracking-cart-items">
        </div>
    </div>

    <div class="sticky-card">
      <h4 style="font-size:.85rem; color:var(--tm); text-transform:uppercase; letter-spacing:1px">Rate Experience</h4>
      <div class="stars"><span>★</span><span>★</span><span>★</span><span>★</span><span>☆</span></div>
    </div>

    <div class="sticky-card">
      <a href="#" class="help-link">
        <div class="help-icon">💬</div>
        <span>Need Help with Order?</span>
      </a>
    </div>
  </div>

</div>

<script>
function loadTrackingCart() {
  const savedCart = localStorage.getItem('agroCart');
  const container = document.getElementById('tracking-cart-items');
  
  if (savedCart && container) {
    const cartData = JSON.parse(savedCart);
    container.innerHTML = cartData.map(item => `
      <div class="o-item">
        <img src="${item.img}" alt="${item.n}">
        <div class="o-info">
          <h4>${item.n}</h4>
          <p>${item.q} ${item.u} • ₹${item.p * item.q}</p>
        </div>
      </div>
    `).join('');
  } else {
    container.innerHTML = '<p style="color:var(--tl); font-size:0.9rem;">No items found.</p>';
  }
}

// Map Animation Logic
let prog = 55;
setInterval(() => {
  if (prog < 96) {
    prog += 0.4;
    document.getElementById('live-progress').style.width = prog + '%';
    const km = ((100 - prog) / 35).toFixed(1);
    document.getElementById('live-dist').textContent = `🛵 ${km} km away`;
  }
}, 3000);

window.addEventListener('DOMContentLoaded', loadTrackingCart);
</script>

</body>
</html>
